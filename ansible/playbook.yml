- name: Configure NAT instance
  hosts: nat
  become: yes

  tasks:
    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present

    - name: Check if MASQUERADE rule exists
      command: iptables -t nat -A POSTROUTING -o ens5 -j MASQUERADE
      register: masq_check
      ignore_errors: yes
      changed_when: false

    - name: Add MASQUERADE if missing
      command: iptables -t -A POSTROUTING -o ens5 -j MASQUERADE
      when: masq_check.rc != 0

    - name: Check FORWARD rule
      command: iptables -A FORWARD -i ens5 -o ens5 -j ACCEPT
      register: fwd_check
      ignore_errors: yes
      changed_when: false

    - name: Add FORWARD rule if missing
      command: iptables -A FORWARD -i ens5 -o ens5 -j ACCEPT
      when: fwd_check.rc != 0

    - name: Check ESTABLISHED rule
      command: iptables -A FORWARD -o ens5 -m state --state RELATED,ESTABLISHED -j ACCEPT
      register: est_check
      ignore_errors: yes
      changed_when: false

    - name: Add ESTABLISHED rule if missing
      command: iptables -A FORWARD -o ens5 -m state --state RELATED,ESTABLISHED -j ACCEPT
      when: est_check != 0

- name: Install Docker on Private EC2
  hosts: private
  become: yes

  tasks:
    - name: Update apt
      apt:
        update_cache: yes
    
    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
    
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repo
      shell: |
        echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu \
        $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
        | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        executable: /bin/bash

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

- name: Deploy app container 
  hosts: private
  become: yes

  tasks:
    - name: Run application container
      community.docker.docker_container:
        name: bug-tracker
        image: veerareddyravuri/bug-tracker-api:latest
        state: started
        recreate: yes
        restart_policy: always
        ports:
          - "8080:8000"